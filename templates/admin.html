<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員設定後台</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --card-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #f472b6, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        /* 網格版面 */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        /* 卡片樣式 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #f1f5f9;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        /* 表單元素 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"], select {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        /* 列表展示 */
        .list-container {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.4);
            padding: 8px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .list-item-text {
            color: #e2e8f0;
        }

        .list-item-subtext {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* 載入中動畫遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- 載入與驗證遮罩 -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-message" class="loading-text">正在驗證管理員身份...</div>
    </div>

    <div class="container">
        <header>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <h1>⚙️ 管理員設定後台</h1>
                <p style="font-size: 0.8rem; color: var(--text-secondary);">動態配置施工進度表所需之基礎資料結構</p>
            </div>
            <a href="/" id="back-home-link" class="back-btn">← 返回施工進度表</a>
        </header>

        <!-- 當前設定建案選擇器 -->
        <div class="card" style="background: rgba(99, 102, 241, 0.08); border-color: rgba(99, 102, 241, 0.3); padding: 16px; margin-bottom: 8px;">
            <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-weight: 700; color: #a5b4fc; font-size: 1.05rem;">🚧 當前設定建案：</span>
                    <select id="project-filter-select" style="min-width: 250px; background: rgba(15, 23, 42, 0.8); cursor: pointer;" onchange="onProjectFilterChange()">
                        <!-- 動態生成 -->
                    </select>
                </div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                    * 棟別、樓層、工項設定將自動關聯至左側所選之「當前設定建案」。
                </div>
            </div>
        </div>

        <div class="admin-grid">
            
            <!-- 0. 建案管理 -->
            <div class="card">
                <div class="card-title">建案管理 (Projects)</div>
                <div class="form-group">
                    <label>新增建案</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="new-project-name" placeholder="輸入建案名稱 (例如: 帝景天廈)">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <select id="copy-project-select" style="flex: 1; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: 8px; padding: 8px; font-size: 0.85rem; height: 38px; outline: none;">
                                <option value="">不複製 (建立全新空白專案)</option>
                            </select>
                            <button class="btn-add" style="height: 38px; min-width: 80px;" onclick="addProject()">新增</button>
                        </div>
                    </div>
                </div>
                <label>目前現有建案</label>
                <div id="projects-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>

            <!-- 1. 棟別管理 -->
            <div class="card">
                <div class="card-title">棟別管理</div>
                <div class="form-group">
                    <label>新增棟別</label>
                    <div class="form-row">
                        <input type="text" id="new-block-name" placeholder="輸入棟別 (例如: C棟)">
                        <button class="btn-add" onclick="addBlock()">新增</button>
                    </div>
                </div>
                <label>目前現有棟別</label>
                <div id="blocks-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>
 
            <!-- 2. 樓層管理 -->
            <div class="card">
                <div class="card-title">樓層管理</div>
                <div class="form-group">
                    <label>新增樓層</label>
                    <div class="form-row">
                        <input type="text" id="new-floor-name" placeholder="輸入樓層 (例如: 6F)">
                        <button class="btn-add" onclick="addFloor()">新增</button>
                    </div>
                </div>
                <label>目前現有樓層</label>
                <div id="floors-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>
 
            <!-- 3. 工項與分類管理 -->
            <div class="card">
                <div class="card-title">施工項目與分類管理</div>
                <div class="form-group">
                    <label>新增工項</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="new-item-category" placeholder="工種分類 (例如: 泥作、水電)">
                        <div class="form-row">
                            <input type="text" id="new-item-name" placeholder="工項名稱 (例如: 天花板粗胚)">
                            <button class="btn-add" onclick="addWorkItem()">新增</button>
                        </div>
                    </div>
                </div>
                <label>目前現有工項</label>
                <div id="items-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>
 
            <!-- 4. 管理員名單管理 -->
            <div class="card">
                <div class="card-title">管理員權限名單 (LINE User ID)</div>
                <div class="form-group">
                    <label>新增管理員</label>
                    <div class="form-row">
                        <input type="text" id="new-admin-id" placeholder="輸入 LINE User ID">
                        <button class="btn-add" onclick="addAdmin()">加入</button>
                    </div>
                </div>
                <label>管理員名單</label>
                <div id="admins-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>
 
            <!-- 5. 授權使用者名單管理 (白名單) -->
            <div class="card" style="grid-column: span 1;">
                <div class="card-title">授權使用者與建案分配</div>
                <div class="form-group">
                    <label>新增/修改 授權工程人員</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="new-allowed-id" placeholder="輸入 LINE User ID">
                        <input type="text" id="new-allowed-name" placeholder="輸入姓名 (例如: 王工程師)">
                        
                        <label style="margin-top: 4px; font-size: 0.85rem; color: var(--text-secondary);">開放建案權限</label>
                        <div id="project-checkboxes-container" style="display: flex; flex-direction: column; gap: 8px; padding: 10px; background: rgba(15, 23, 42, 0.4); border-radius: 8px; border: 1px solid var(--glass-border); max-height: 120px; overflow-y: auto;">
                            <!-- 動態生成建案核取方塊 -->
                        </div>
                        
                        <button class="btn-add" style="margin-top: 4px;" onclick="addAllowedUser()">儲存 / 更新使用者</button>
                    </div>
                </div>
                <label>目前已授權名單</label>
                <div id="allowed-users-list" class="list-container">
                    <!-- 動態生成 -->
                </div>
            </div>
 
        </div>
    </div>

    <script>
        // 從 URL 解析 userId 參數
        const urlParams = new URLSearchParams(window.location.search);
        const adminUserId = urlParams.get('userId');

        // 當前設定中的建案 ID
        let currentSettingProjectId = 1;

        // 全域快取配置資料
        let configData = {
            projects: [],
            blocks: [],
            floors: [],
            work_items: [],
            admins: [],
            allowed_users: []
        };

        // 頁面加載時先進行權限檢查
        document.addEventListener("DOMContentLoaded", function() {
            // 設定「返回首頁」的連結也帶上 userId，避免返回時身分丟失
            if (adminUserId) {
                document.getElementById("back-home-link").href = `/?userId=${encodeURIComponent(adminUserId)}`;
            }

            if (!adminUserId) {
                authFailed("錯誤：未偵測到您的 LINE User ID，拒絕存取後台。");
                return;
            }

            // 呼叫後端 API 驗證是否為管理員
            fetch(`/api/is_admin?userId=${encodeURIComponent(adminUserId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.is_admin) {
                        // 權限通過，載入後台配置資料
                        loadConfigData();
                    } else {
                        authFailed("權限不足：您並非系統登記的管理員，無法進入後台。");
                    }
                })
                .catch(err => {
                    console.error(err);
                    authFailed("網路或系統錯誤，無法驗證權限。");
                });
        });

        function authFailed(message) {
            document.getElementById("loading-message").innerText = message;
            document.getElementById("loading-message").style.color = "var(--danger)";
            // 隱藏 spinner
            document.querySelector(".spinner").style.display = "none";
            
            // 3秒後自動彈回首頁
            setTimeout(() => {
                window.location.href = "/";
            }, 3000);
        }

        // =====================================================================
        // API 讀取邏輯
        // =====================================================================
        function loadConfigData() {
            document.getElementById("loading").style.display = "flex";
            
            fetch(`/api/admin/config?userId=${encodeURIComponent(adminUserId)}`)
                .then(res => {
                    if (!res.ok) throw new Error("讀取後台設定失敗");
                    return res.json();
                })
                .then(data => {
                    configData = data;
                    
                    // 初始化專案下拉選單與工程師專案勾選清單
                    renderProjectSelectAndCheckboxes();
                    
                    // 渲染所有列表
                    renderAllLists();
                    document.getElementById("loading").style.display = "none";
                })
                .catch(err => {
                    console.error(err);
                    alert("無法載入配置資料");
                    document.getElementById("loading").style.display = "none";
                });
        }

        // =====================================================================
        // UI 專案篩選與初始化
        // =====================================================================
        function renderProjectSelectAndCheckboxes() {
            // 1. 渲染頂部專案下拉選單
            const select = document.getElementById("project-filter-select");
            const previousSelectValue = select.value;
            select.innerHTML = "";
            
            configData.projects.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p.id;
                opt.text = p.name;
                select.add(opt);
            });
            
            // 恢復上次選擇或預設選第一個
            if (previousSelectValue && configData.projects.some(p => p.id == previousSelectValue)) {
                select.value = previousSelectValue;
            } else if (configData.projects.length > 0) {
                select.value = configData.projects[0].id;
            }
            currentSettingProjectId = parseInt(select.value) || 1;
            
            // 2. 渲染授權工程師卡片底下的建案核取方塊
            const cbContainer = document.getElementById("project-checkboxes-container");
            cbContainer.innerHTML = "";
            if (configData.projects.length === 0) {
                cbContainer.innerHTML = "<span style='color: var(--text-secondary); font-size: 0.85rem;'>請先新增建案</span>";
            } else {
                configData.projects.forEach(p => {
                    const label = document.createElement("label");
                    label.style.display = "flex";
                    label.style.alignItems = "center";
                    label.style.gap = "8px";
                    label.style.cursor = "pointer";
                    label.style.fontSize = "0.85rem";
                    label.style.color = "#e2e8f0";
                    label.innerHTML = `
                        <input type="checkbox" class="project-permission-cb" value="${p.id}" style="cursor: pointer;">
                        <span>${p.name}</span>
                    `;
                    cbContainer.appendChild(label);
                });
            }

            // 3. 渲染「複製既有建案配置」下拉選單
            const copySelect = document.getElementById("copy-project-select");
            copySelect.innerHTML = '<option value="">不複製 (建立全新空白專案)</option>';
            configData.projects.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p.id;
                opt.text = `複製「${p.name}」的配置`;
                copySelect.add(opt);
            });
        }

        function onProjectFilterChange() {
            const select = document.getElementById("project-filter-select");
            currentSettingProjectId = parseInt(select.value) || 1;
            
            // 當前選取專案變更時，僅需重新渲染專案關聯的三個子項目
            renderBlocks();
            renderFloors();
            renderWorkItems();
        }

        // =====================================================================
        // UI 渲染列表
        // =====================================================================
        function renderAllLists() {
            renderProjects();
            renderBlocks();
            renderFloors();
            renderWorkItems();
            renderAdmins();
            renderAllowedUsers();
        }

        // 渲染建案
        function renderProjects() {
            const container = document.getElementById("projects-list");
            container.innerHTML = "";
            if (configData.projects.length === 0) {
                container.innerHTML = "<div style='color: var(--text-secondary); padding: 8px;'>暫無資料</div>";
                return;
            }
            configData.projects.forEach(p => {
                const item = document.createElement("div");
                item.className = "list-item";
                const isDefault = p.id === 1;
                item.innerHTML = `
                    <span class="list-item-text">${p.name} ${isDefault ? '<small style="color: var(--text-secondary)">(系統保留)</small>' : ''}</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-delete" style="color: var(--primary);" onclick="editProject(${p.id}, '${p.name}')">✏️ 編輯</button>
                        ${isDefault ? '' : `<button class="btn-delete" onclick="deleteProject(${p.id}, '${p.name}')">🗑 刪除</button>`}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 渲染與當前專案關聯的棟別
        function renderBlocks() {
            const container = document.getElementById("blocks-list");
            container.innerHTML = "";
            
            const filteredBlocks = configData.blocks.filter(b => b.project_id == currentSettingProjectId);
            
            if (filteredBlocks.length === 0) {
                container.innerHTML = "<div style='color: var(--text-secondary); padding: 8px;'>此建案暫無棟別資料</div>";
                return;
            }
            filteredBlocks.forEach(b => {
                const item = document.createElement("div");
                item.className = "list-item";
                item.innerHTML = `
                    <span class="list-item-text">${b.name}</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-delete" style="color: var(--primary);" onclick="editBlock(${b.id}, '${b.name}')">✏️ 編輯</button>
                        <button class="btn-delete" onclick="deleteBlock(${b.id}, '${b.name}')">🗑 刪除</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 渲染與當前專案關聯的樓層
        function renderFloors() {
            const container = document.getElementById("floors-list");
            container.innerHTML = "";
            
            const filteredFloors = configData.floors.filter(f => f.project_id == currentSettingProjectId);
            
            if (filteredFloors.length === 0) {
                container.innerHTML = "<div style='color: var(--text-secondary); padding: 8px;'>此建案暫無樓層資料</div>";
                return;
            }
            filteredFloors.forEach(f => {
                const item = document.createElement("div");
                item.className = "list-item";
                item.innerHTML = `
                    <span class="list-item-text">${f.name}</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-delete" style="color: var(--primary);" onclick="editFloor(${f.id}, '${f.name}')">✏️ 編輯</button>
                        <button class="btn-delete" onclick="deleteFloor(${f.id}, '${f.name}')">🗑 刪除</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 渲染與當前專案關聯的工項
        function renderWorkItems() {
            const container = document.getElementById("items-list");
            container.innerHTML = "";
            
            const filteredItems = configData.work_items.filter(item => item.project_id == currentSettingProjectId);
            
            if (filteredItems.length === 0) {
                container.innerHTML = "<div style='color: var(--text-secondary); padding: 8px;'>此建案暫無工項資料</div>";
                return;
            }
            filteredItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `
                    <div>
                        <span class="list-item-subtext" style="background: rgba(99,102,241,0.2); padding: 2px 6px; border-radius: 4px; color: #a5b4fc; font-size: 0.75rem; margin-left: 0; margin-right: 8px;">${item.category}</span>
                        <span class="list-item-text">${item.name}</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-delete" style="color: var(--primary);" onclick="editWorkItem(${item.id}, '${item.category}', '${item.name}')">✏️ 編輯</button>
                        <button class="btn-delete" onclick="deleteWorkItem(${item.id}, '${item.category}-${item.name}')">🗑 刪除</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 渲染管理員
        function renderAdmins() {
            const container = document.getElementById("admins-list");
            container.innerHTML = "";
            configData.admins.forEach(a => {
                const item = document.createElement("div");
                item.className = "list-item";
                const isSelf = a.line_user_id === adminUserId;
                item.innerHTML = `
                    <span class="list-item-text" style="font-family: monospace; font-size: 0.85rem;">${a.line_user_id} ${isSelf ? '<small style="color: var(--success)">(您自己)</small>' : ''}</span>
                    ${isSelf ? '' : `<button class="btn-delete" onclick="deleteAdmin(${a.id}, '${a.line_user_id}')">🗑 移除</button>`}
                `;
                container.appendChild(item);
            });
        }

        // 渲染授權使用者 (白名單)
        function renderAllowedUsers() {
            const container = document.getElementById("allowed-users-list");
            container.innerHTML = "";
            if (!configData.allowed_users || configData.allowed_users.length === 0) {
                container.innerHTML = "<div style='color: var(--text-secondary); padding: 8px;'>暫無資料</div>";
                return;
            }
            
            // 建立專案 ID 到名稱的字典對照表
            const projectMap = {};
            configData.projects.forEach(p => {
                projectMap[p.id] = p.name;
            });
            
            configData.allowed_users.forEach(u => {
                const item = document.createElement("div");
                item.className = "list-item";
                
                // 取得授權的建案名稱清單
                const projectNames = u.project_ids.map(id => projectMap[id] || `建案ID:${id}`).join(", ");
                const displayProjects = projectNames || "無分配建案";
                
                item.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 4px; max-width: 70%;">
                        <span class="list-item-text" style="font-weight: 600; color: #f8fafc;">${u.name}</span>
                        <span class="list-item-subtext" style="font-family: monospace; font-size: 0.75rem; margin-left: 0; word-break: break-all;">ID: ${u.line_user_id}</span>
                        <span style="font-size: 0.75rem; color: #a5b4fc;">開放建案: ${displayProjects}</span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button class="btn-delete" style="color: var(--primary);" onclick="editAllowedUser('${u.line_user_id}', '${u.name}', '${JSON.stringify(u.project_ids)}')">✏️ 編輯</button>
                        <button class="btn-delete" onclick="deleteAllowedUser(${u.id}, '${u.name}')">🗑 移除</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 載入編輯使用者資訊
        function editAllowedUser(lineUserId, name, projectIdsJson) {
            document.getElementById("new-allowed-id").value = lineUserId;
            document.getElementById("new-allowed-name").value = name;
            
            const projectIds = JSON.parse(projectIdsJson);
            const checkboxes = document.querySelectorAll(".project-permission-cb");
            checkboxes.forEach(cb => {
                cb.checked = projectIds.includes(parseInt(cb.value));
            });
            
            // 捲動至表單方便編輯
            document.getElementById("new-allowed-id").scrollIntoView({ behavior: 'smooth' });
        }

        // =====================================================================
        // 增刪控制 API 串接
        // =====================================================================
        function postAdminAction(endpoint, payload, successCallback) {
            document.getElementById("loading").style.display = "flex";
            payload.userId = adminUserId;
            
            fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    successCallback();
                    loadConfigData();
                } else {
                    alert("執行失敗：" + (res.error || "未知錯誤"));
                    document.getElementById("loading").style.display = "none";
                }
            })
            .catch(err => {
                console.error(err);
                alert("網路或系統錯誤，操作失敗");
                document.getElementById("loading").style.display = "none";
            });
        }

        // 建案管理
        function addProject() {
            const input = document.getElementById("new-project-name");
            const copySelect = document.getElementById("copy-project-select");
            const name = input.value.trim();
            const copyFromProjectId = copySelect.value;
            
            if (!name) return;
            
            const payload = { name };
            if (copyFromProjectId) {
                payload.copyFromProjectId = parseInt(copyFromProjectId);
            }
            
            postAdminAction("/api/admin/add_project", payload, () => {
                input.value = "";
                copySelect.value = "";
            });
        }
        
        function deleteProject(id, name) {
            if (id === 1) {
                alert("預設建案為系統保留，無法刪除！");
                return;
            }
            if (!confirm(`警告：刪除建案「${name}」將會永久刪除該建案下的所有棟別、樓層、施工工項以及所有的施工進度紀錄！此操作完全不可逆，是否確認刪除？`)) return;
            postAdminAction("/api/admin/delete_project", { id }, () => {});
        }

        // 編輯基礎名稱的彈框與 API 呼叫
        function editProject(id, oldName) {
            const name = prompt("請輸入新的建案名稱：", oldName);
            if (name === null) return;
            const trimmedName = name.trim();
            if (!trimmedName) {
                alert("建案名稱不能為空");
                return;
            }
            postAdminAction("/api/admin/edit_project", { id, name: trimmedName }, () => {});
        }

        function editBlock(id, oldName) {
            const name = prompt("請輸入新的棟別名稱：", oldName);
            if (name === null) return;
            const trimmedName = name.trim();
            if (!trimmedName) {
                alert("棟別名稱不能為空");
                return;
            }
            postAdminAction("/api/admin/edit_block", { id, name: trimmedName }, () => {});
        }

        function editFloor(id, oldName) {
            const name = prompt("請輸入新的樓層名稱：", oldName);
            if (name === null) return;
            const trimmedName = name.trim();
            if (!trimmedName) {
                alert("樓層名稱不能為空");
                return;
            }
            postAdminAction("/api/admin/edit_floor", { id, name: trimmedName }, () => {});
        }

        function editWorkItem(id, oldCategory, oldName) {
            const category = prompt("請輸入新的工種分類：", oldCategory);
            if (category === null) return;
            const trimmedCategory = category.trim();
            if (!trimmedCategory) {
                alert("工種分類不能為空");
                return;
            }
            
            const name = prompt("請輸入新的工項名稱：", oldName);
            if (name === null) return;
            const trimmedName = name.trim();
            if (!trimmedName) {
                alert("工項名稱不能為空");
                return;
            }
            
            postAdminAction("/api/admin/edit_work_item", { id, category: trimmedCategory, name: trimmedName }, () => {});
        }

        // 棟別
        function addBlock() {
            const input = document.getElementById("new-block-name");
            const name = input.value.trim();
            if (!name) return;
            postAdminAction("/api/admin/add_block", { name, projectId: currentSettingProjectId }, () => {
                input.value = "";
            });
        }
        function deleteBlock(id, name) {
            if (!confirm(`警告：刪除棟別「${name}」將會永久刪除該棟別下的所有施工進度，此操作不可逆！是否確認刪除？`)) return;
            postAdminAction("/api/admin/delete_block", { id }, () => {});
        }

        // 樓層
        function addFloor() {
            const input = document.getElementById("new-floor-name");
            const name = input.value.trim();
            if (!name) return;
            postAdminAction("/api/admin/add_floor", { name, projectId: currentSettingProjectId }, () => {
                input.value = "";
            });
        }
        function deleteFloor(id, name) {
            if (!confirm(`警告：刪除樓層「${name}」將同步刪除所有棟別在該樓層的施工進度，是否確認刪除？`)) return;
            postAdminAction("/api/admin/delete_floor", { id }, () => {});
        }

        // 工項
        function addWorkItem() {
            const catInput = document.getElementById("new-item-category");
            const nameInput = document.getElementById("new-item-name");
            const category = catInput.value.trim();
            const name = nameInput.value.trim();
            if (!category || !name) {
                alert("請填寫完整的工種分類與工項名稱");
                return;
            }
            postAdminAction("/api/admin/add_work_item", { category, name, projectId: currentSettingProjectId }, () => {
                nameInput.value = "";
            });
        }
        function deleteWorkItem(id, name) {
            if (!confirm(`警告：刪除工項「${name}」將同步刪除所有樓層在該工項的施工進度，是否確認刪除？`)) return;
            postAdminAction("/api/admin/delete_work_item", { id }, () => {});
        }

        // 管理員
        function addAdmin() {
            const input = document.getElementById("new-admin-id");
            const line_user_id = input.value.trim();
            if (!line_user_id) return;
            postAdminAction("/api/admin/add_admin", { line_user_id }, () => {
                input.value = "";
            });
        }
        function deleteAdmin(id, line_user_id) {
            if (!confirm(`確認將「${line_user_id}」從管理員名單中移除嗎？`)) return;
            postAdminAction("/api/admin/delete_admin", { id }, () => {});
        }

        // 授權工程師 (白名單)
        function addAllowedUser() {
            const idInput = document.getElementById("new-allowed-id");
            const nameInput = document.getElementById("new-allowed-name");
            const line_user_id = idInput.value.trim();
            const name = nameInput.value.trim();
            
            // 讀取所有選取的開放建案
            const checkboxes = document.querySelectorAll(".project-permission-cb");
            const project_ids = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    project_ids.push(parseInt(cb.value));
                }
            });
            
            if (!line_user_id || !name) {
                alert("請填寫完整的 LINE User ID 與工程師姓名");
                return;
            }
            if (project_ids.length === 0) {
                alert("請至少勾選一個開放建案權限");
                return;
            }
            
            postAdminAction("/api/admin/add_allowed_user", { line_user_id, name, project_ids }, () => {
                idInput.value = "";
                nameInput.value = "";
                // 重置核取方塊
                checkboxes.forEach(cb => cb.checked = false);
            });
        }
        function deleteAllowedUser(id, name) {
            if (!confirm(`確認取消「${name}」的使用授權嗎？\n移除後他將無法登入或修改任何施工進度。`)) return;
            postAdminAction("/api/admin/delete_allowed_user", { id }, () => {});
        }
    </script>
</body>
</html>
